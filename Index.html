<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focusly — ADHD Support</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#FDF8F2;font-family:'DM Sans','Segoe UI',sans-serif;color:#2E1F0F;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#F2EBE0}
::-webkit-scrollbar-thumb{background:#E4D8C8;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .35s ease both}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar{
position:fixed;top:0;left:0;height:100vh;width:220px;z-index:200;
background:#F2EBE0;border-right:1px solid #E4D8C8;
display:flex;flex-direction:column;padding:24px 0;
overflow-y:auto;overflow-x:hidden;
transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#sidebar.collapsed{transform:translateX(-220px)}
#sidebar.floating{box-shadow:6px 0 28px rgba(60,30,10,.15)}

/* ── OVERLAY (unpinned) ──────────────────────────────────── */
#sb-overlay{
display:none;position:fixed;inset:0;z-index:199;
background:rgba(46,31,15,.3);backdrop-filter:blur(2px);
}
#sb-overlay.visible{display:block}

/* ── HAMBURGER TOGGLE ────────────────────────────────────── */
#sb-toggle{
position:fixed;top:16px;z-index:300;
width:36px;height:36px;border-radius:10px;
border:1px solid #E4D8C8;background:#F2EBE0;
cursor:pointer;display:flex;align-items:center;justify-content:center;
box-shadow:0 2px 8px rgba(60,30,10,.1);
transition:left .28s cubic-bezier(.4,0,.2,1),background .15s;
}
#sb-toggle:hover{background:#E4D8C8}

/* ── MAIN ────────────────────────────────────────────────── */
#main{
min-height:100vh;padding:32px 36px;max-width:900px;
transition:margin-left .28s cubic-bezier(.4,0,.2,1);
}

/* ── SIDEBAR INTERNALS ───────────────────────────────────── */
.sb-brand{padding:0 16px 24px;display:flex;align-items:center;gap:10px}
.sb-logo{width:34px;height:34px;background:#C4714A;border-radius:10px;
display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-name{font-family:‘Lora’,Georgia,serif;font-weight:700;font-size:15px;color:#2E1F0F}
.sb-sub{font-size:11px;color:#A08B76}
.sb-pin{width:26px;height:26px;border-radius:7px;border:1px solid #E4D8C8;
background:transparent;cursor:pointer;display:flex;align-items:center;
justify-content:center;margin-left:auto;flex-shrink:0;transition:all .15s}
.sb-pin:hover{background:#E4D8C8}
.sb-pin.on{background:#FAEADE;border-color:#C4714A}
.sb-nav{flex:1;padding:0 10px;display:flex;flex-direction:column;gap:2px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;
border-radius:10px;border:none;cursor:pointer;width:100%;text-align:left;
background:transparent;color:#6B5240;font-family:‘DM Sans’,sans-serif;
font-size:14px;font-weight:400;transition:all .15s}
.nav-btn:hover{background:#E4D8C8}
.nav-btn.active{background:#FAEADE;color:#9E5636;font-weight:600}
.sb-foot{padding:16px 20px;border-top:1px solid #E4D8C8;font-size:11px;color:#A08B76;line-height:1.5}

/* ── CARDS ───────────────────────────────────────────────── */
.card{background:#fff;border-radius:16px;border:1px solid #E4D8C8;
box-shadow:0 2px 12px rgba(60,30,10,.08)}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;
font-family:‘DM Sans’,sans-serif;font-weight:500;cursor:pointer;
transition:opacity .18s;border:none;font-size:14px;padding:10px 20px}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#C4714A;color:#fff}
.btn-secondary{background:#F2EBE0;color:#2E1F0F;border:1px solid #E4D8C8}
.btn-ghost{background:transparent;color:#6B5240}
.btn-green{background:#4E8B6A;color:#fff}
.btn-sm{padding:6px 14px!important;font-size:13px!important}

/* ── BADGE ───────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 10px;
border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.04em}

/* ── INPUTS ──────────────────────────────────────────────── */
input[type=text],input[type=password],textarea,select{
width:100%;padding:10px 14px;border-radius:10px;border:1px solid #E4D8C8;
background:#FDF8F2;font-family:‘DM Sans’,sans-serif;font-size:14px;
color:#2E1F0F;outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=password]:focus,textarea:focus{border-color:#C4714A}
input[type=time]{padding:8px 12px;border-radius:8px;border:1px solid #E4D8C8;
background:#FDF8F2;font-family:‘DM Sans’,sans-serif;font-size:16px;color:#2E1F0F;outline:none}
textarea{resize:vertical}

/* ── TOGGLE SWITCH ───────────────────────────────────────── */
.tog{width:44px;height:24px;border-radius:999px;border:none;cursor:pointer;
position:relative;transition:background .2s;flex-shrink:0}
.tog-dot{width:18px;height:18px;border-radius:50%;background:#fff;
position:absolute;top:3px;transition:left .2s}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(30,15,5,.45);z-index:1000;
display:flex;align-items:center;justify-content:center;padding:16px;
backdrop-filter:blur(3px)}
.modal-box{background:#fff;border-radius:20px;width:100%;max-height:85vh;
overflow-y:auto;box-shadow:0 8px 32px rgba(60,30,10,.12);animation:fadeUp .3s ease}
.modal-head{display:flex;align-items:center;justify-content:space-between;
padding:20px 24px;border-bottom:1px solid #E4D8C8}
.modal-head h3{font-family:‘Lora’,Georgia,serif;font-size:18px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:#A08B76;padding:4px;
display:flex;align-items:center}
.modal-body{padding:20px 24px}

/* ── CHECKBOX ────────────────────────────────────────────── */
.cb{width:22px;height:22px;border-radius:6px;border:2px solid #E4D8C8;
background:transparent;cursor:pointer;flex-shrink:0;
display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb.on{background:#4E8B6A;border-color:#4E8B6A}
.cb-sm{width:18px;height:18px;border-radius:4px}

/* ── ICON BUTTON ─────────────────────────────────────────── */
.icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid #E4D8C8;
background:#FDF8F2;cursor:pointer;display:flex;align-items:center;
justify-content:center;transition:background .15s}
.icon-btn:hover{background:#F2EBE0}

/* ── TIP PILL ────────────────────────────────────────────── */
.tip-pill{padding:6px 12px;border-radius:999px;border:1px solid #E4D8C8;
background:#FDF8F2;font-size:12px;color:#6B5240;cursor:pointer;
display:inline-flex;align-items:center;gap:6px;
font-family:‘DM Sans’,sans-serif;transition:background .15s}
.tip-pill:hover{background:#F2EBE0}

/* ── PROGRESS ────────────────────────────────────────────── */
.prog-track{flex:1;height:4px;border-radius:2px;background:#E4D8C8}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}

@media(max-width:700px){#main{padding:16px}}
</style>

</head>
<body>

<script>
// ═══════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════
var SB = { open: true, pinned: true };

function sbApply() {
  var sidebar   = document.getElementById('sidebar');
  var main      = document.getElementById('main');
  var overlay   = document.getElementById('sb-overlay');
  var pin       = document.getElementById('sb-pin');
  var togBtn    = document.getElementById('sb-toggle');

  if (SB.open) {
    sidebar.classList.remove('collapsed');
    if (SB.pinned) {
      sidebar.classList.remove('floating');
      overlay.classList.remove('visible');
      main.style.marginLeft = '220px';
      togBtn.style.left     = '232px';
    } else {
      sidebar.classList.add('floating');
      overlay.classList.add('visible');
      main.style.marginLeft = '0';
      togBtn.style.left     = '232px';
    }
  } else {
    sidebar.classList.add('collapsed');
    sidebar.classList.remove('floating');
    overlay.classList.remove('visible');
    main.style.marginLeft = '0';
    togBtn.style.left     = '12px';
  }

  if (pin) {
    if (SB.pinned) {
      pin.classList.add('on');
      pin.title = 'Unpin sidebar';
    } else {
      pin.classList.remove('on');
      pin.title = 'Pin sidebar open';
    }
  }
}

function sbToggle() {
  SB.open = !SB.open;
  sbApply();
}

function sbPin() {
  SB.pinned = !SB.pinned;
  SB.open   = true;
  sbApply();
}

var TIPS = {
  initiation:{title:'Task Initiation Strategies',color:'#C89030',bg:'#FBF2DC',

    source:'Dr. Russell Barkley, CHADD'},
  environment:{title:'Environment Setup',color:'#4E8B6A',bg:'#E0F0E8',
    tips:['🎧 Noise-cancelling headphones or brown/white noise.','📵 Put phone in another room.','💡 Bright, cool-toned lighting for focus tasks.','🌡️ Cooler room temperature aids concentration.','🗂️ Clear desk of everything not related to current task.','🌿 A plant or natural element can reduce stress.'],

// ═══════════════════════════════════════════════════════
//  DOM HELPERS
// ═══════════════════════════════════════════════════════
function d(style, html) {
  var e = document.createElement('div');
  if (style) Object.assign(e.style, style);
  if (html)  e.innerHTML = html;
  return e;
}
function p(style, text) {
  var e = document.createElement('p');
  if (style) Object.assign(e.style, style);
  e.textContent = text;
  return e;
}
function hx(tag, style, html) {
  var e = document.createElement(tag);
  if (style) Object.assign(e.style, style);
  if (html)  e.innerHTML = html;
  return e;
}
function card(style) {
  var e = document.createElement('div');
  e.className = 'card';
  if (style) Object.assign(e.style, style);
  return e;
}
function badge(text, color, bg) {
  var e = document.createElement('span');
  e.className = 'badge';
  e.style.color = color;
  e.style.background = bg;
  e.textContent = text;
  return e;
}
function btn(html, cls, fn) {
  var b = document.createElement('button');
  b.className = 'btn ' + cls;
  b.innerHTML = html;
  b.onclick   = fn;
  return b;
}
function iconBtn(name, fn) {
  var b = document.createElement('button');
  b.className = 'icon-btn';
  b.innerHTML = ic(name, 13, '#A08B76');
  b.onclick   = fn;
  return b;
}
function tog(active, fn, activeCol) {
  activeCol = activeCol || '#4E8B6A';
  var w = document.createElement('button');
  w.className = 'tog';
  w.style.background = active ? activeCol : '#E4D8C8';
  w.onclick = fn;
  var dot = document.createElement('div');
  dot.className = 'tog-dot';
  dot.style.left = active ? '23px' : '3px';
  w.appendChild(dot);
  return w;
}
function inp(placeholder, value) {
  var i = document.createElement('input');
  i.type = 'text';
  i.placeholder = placeholder || '';
  i.value = value || '';
  return i;
}
function ta(placeholder, value, rows) {
  var t = document.createElement('textarea');
  t.placeholder = placeholder || '';
  t.value = value || '';
  t.rows  = rows || 3;
  t.style.width = '100%';
  return t;
}
function section() {
  var e = document.createElement('div');
  e.className = 'fade-up';
  e.style.cssText = 'display:flex;flex-direction:column;gap:20px';
  return e;
}
function row(justify) {
  var e = document.createElement('div');
  e.style.cssText = 'display:flex;align-items:center;gap:10px' + (justify ? ';justify-content:' + justify : '');
  return e;
}
function grid2() {
  var e = document.createElement('div');
  e.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:16px';
  return e;
}
function gap(px) {
  var e = document.createElement('div');
  e.style.height = px + 'px';
  return e;
}

// ═══════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════
function showModal(title, width, fn) {
  var root = document.getElementById('modal-root');
  root.innerHTML = '';
  var bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.onclick = function(e) { if (e.target === bg) closeModal(); };
  var box = document.createElement('div');
  box.className = 'modal-box';
  box.style.maxWidth = (width || 520) + 'px';
  var head = document.createElement('div');
  head.className = 'modal-head';
  head.innerHTML = '<h3>' + title + '</h3>';
  var cl = document.createElement('button');
  cl.className = 'modal-close';
  cl.innerHTML = ic('close', 20, '#A08B76');
  cl.onclick = closeModal;
  head.appendChild(cl);
  var body = document.createElement('div');
  body.className = 'modal-body';
  fn(body);
  box.appendChild(head);
  box.appendChild(body);
  bg.appendChild(box);
  root.appendChild(bg);
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
function goTo(v) {
  S.view = v;
  document.querySelectorAll('.nav-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.view === v);
  });
  // Auto-close sidebar when floating (not pinned)
  if (SB.open && !SB.pinned) {
    SB.open = false;
    sbApply();
  }
  renderView();
}

function renderView() {
  var m = document.getElementById('main');
  m.innerHTML = '';
  var views = {
    dashboard: vDashboard,
    tasks:     vTasks,
    projects:  vProjects,
    focus:     vFocus,
    reminders: vReminders,
    sleep:     vSleep,
    toolkit:   vToolkit,
  };
  var fn = views[S.view];
  if (fn) m.appendChild(fn());
}

function showTip(key) {
  var t = TIPS[key];
  showModal(t.title, 520, function(body) {
    var pill = d({display:'flex',alignItems:'center',marginBottom:'16px'});
    pill.innerHTML = '<span class="badge" style="color:'+t.color+';background:'+t.bg+';padding:4px 14px">📚 Evidence-based strategies</span>';
    body.appendChild(pill);
    t.tips.forEach(function(tip, i) {
      var item = d({padding:'12px 14px',borderRadius:'10px',background:'#FDF8F2',
        border:'1px solid #E4D8C8',fontSize:'14px',lineHeight:'1.5',marginBottom:'8px',
        animation:'slideIn .3s ease '+(i*.05)+'s both'});
      item.textContent = tip;
      body.appendChild(item);
    });
    body.appendChild(p({marginTop:'16px',fontSize:'12px',color:'#A08B76',fontStyle:'italic'}, 'Source: ' + t.source));
  });
}

// ═══════════════════════════════════════════════════════
//  AI BREAKDOWN
// ═══════════════════════════════════════════════════════
function showAI(task) {
  showModal('🤖 AI Task Breakdown', 540, function(body) {
    var tl = d({padding:'10px 14px',borderRadius:'10px',background:'#FAEADE',
      marginBottom:'16px',fontSize:'14px',color:'#9E5636',fontWeight:'500'});
    tl.textContent = '📋 ' + task.title;
    body.appendChild(tl);

    var note = d({padding:'12px',borderRadius:'10px',background:'#FBF2DC',
      border:'1px solid rgba(200,144,48,.4)',fontSize:'13px',color:'#6B5240',
      marginBottom:'12px',lineHeight:'1.6'});
    note.textContent = '🔑 Enter your Anthropic API key to generate steps. Never stored — used only for this request.';
    body.appendChild(note);

    var ki = document.createElement('input');
    ki.type = 'password';
    ki.placeholder = 'sk-ant-... (Anthropic API key)';
    ki.style.cssText = 'width:100%;padding:10px 14px;border-radius:10px;border:1px solid #E4D8C8;background:#FDF8F2;font-family:DM Sans,sans-serif;font-size:14px;color:#2E1F0F;outline:none;margin-bottom:12px';
    body.appendChild(ki);

    var res = d({marginTop:'4px'});
    body.appendChild(res);

    var genBtn = btn(ic('star',16,'#fff') + ' ✨ Generate Steps', 'btn-primary', function() {
      var key = ki.value.trim();
      if (!key) { alert('Please enter your Anthropic API key.'); return; }
      genBtn.disabled = true;
      genBtn.textContent = 'Generating...';
      res.innerHTML = '<div style="text-align:center;padding:24px"><div style="width:32px;height:32px;border:3px solid #FAEADE;border-top-color:#C4714A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div><p style="color:#A08B76;font-size:14px">Breaking it down...</p></div>';
      fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
        body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
          messages:[{role:'user',content:'You are an ADHD coach. Break this task into 4-6 small, concrete, ADHD-friendly steps. Each step starts with a verb, takes ≤10 minutes, uses plain language. Task: "'+task.title+'". Respond ONLY with a JSON array of strings.'}]})
      }).then(function(r){return r.json();}).then(function(data) {
        var steps = JSON.parse((data.content[0].text||'[]').replace(/```json|```/g,'').trim());
        res.innerHTML = '';
        steps.forEach(function(step, i) {
          var row2 = d({display:'flex',alignItems:'flex-start',gap:'10px',padding:'10px 12px',
            borderRadius:'8px',background:'#FDF8F2',border:'1px solid #E4D8C8',marginBottom:'8px'});
          row2.innerHTML = '<span style="min-width:20px;height:20px;border-radius:6px;background:#FAEADE;color:#C4714A;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center">'+(i+1)+'</span><span style="font-size:13px;color:#6B5240">'+step+'</span>';
          res.appendChild(row2);
        });
        var br = d({display:'flex',gap:'8px',marginTop:'8px'});
        br.appendChild(btn('✅ Add to Task', 'btn-primary btn-sm', function() {
          steps.forEach(function(s) { task.subtasks.push({id:Date.now()+Math.random(),title:s,done:false}); });
          closeModal(); S.expandedTask = task.id; renderView();
        }));
        br.appendChild(btn('Try Again', 'btn-secondary btn-sm', function() {
          res.innerHTML = ''; genBtn.disabled = false;
          genBtn.innerHTML = ic('star',16,'#fff') + ' ✨ Generate Steps';
        }));
        res.appendChild(br);
      }).catch(function(e) {
        res.innerHTML = '<p style="color:#C45A7A;font-size:14px">Error: '+e.message+'</p>';
        genBtn.disabled = false;
        genBtn.innerHTML = ic('star',16,'#fff') + ' ✨ Generate Steps';
      });
    });
    body.appendChild(genBtn);
  });
}

// ═══════════════════════════════════════════════════════
//  VIEW: DASHBOARD
// ═══════════════════════════════════════════════════════
function vDashboard() {
  var today = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  var pending = S.tasks.filter(function(t){return !t.done;});
  var doneN   = S.tasks.filter(function(t){return t.done;}).length;
  var sec = section();

  // Header
  var hdr = d();
  hdr.innerHTML = '<p style="font-size:13px;color:#A08B76;margin-bottom:4px">'+today+'</p>'
    + '<h1 style="font-family:Lora,Georgia,serif;font-size:28px;font-weight:700">Good morning ✨</h1>'
    + '<p style="color:#6B5240;margin-top:6px;font-size:15px">Let\'s make today manageable — one step at a time.</p>';
  sec.appendChild(hdr);

  // Energy check-in
  var eCard = card({padding:'20px'});
  eCard.appendChild(hx('h2',{fontFamily:'Lora,Georgia,serif',fontSize:'16px',marginBottom:'14px',color:'#2E1F0F'},'How\'s your energy right now?'));
  var eRow = row();
  [{id:'low',emoji:'🔋',label:'Low',color:'#C45A7A',bg:'#FAEAF0'},
   {id:'medium',emoji:'⚡',label:'Medium',color:'#C89030',bg:'#FBF2DC'},
   {id:'high',emoji:'🚀',label:'High',color:'#4E8B6A',bg:'#E0F0E8'}].forEach(function(e) {
    var act = S.energy === e.id;
    var b = document.createElement('button');
    b.style.cssText = 'flex:1;padding:12px 8px;border-radius:12px;border:2px solid '+(act?e.color:'#E4D8C8')+';background:'+(act?e.bg:'#FDF8F2')+';cursor:pointer;text-align:center;font-family:DM Sans,sans-serif;transition:all .18s';
    b.innerHTML = '<div style="font-size:22px">'+e.emoji+'</div><div style="font-size:13px;font-weight:600;color:'+(act?e.color:'#6B5240')+';margin-top:4px">'+e.label+'</div>';
    b.onclick = function() { S.energy = e.id; renderView(); };
    eRow.appendChild(b);
  });
  eCard.appendChild(eRow);
  if (S.energy) {
    var msgs = {low:'💙 Low energy day — prioritise your most essential task only. Be kind to yourself.',medium:'🌤️ Medium energy — pick 2-3 tasks max. Take breaks every 25 minutes.',high:'🌟 High energy — great time for your hardest task! Watch for hyperfocus.'};
    var note = d({marginTop:'14px',padding:'10px 14px',borderRadius:'10px',background:'#FDF8F2',fontSize:'13px',color:'#6B5240'});
    note.textContent = msgs[S.energy];
    eCard.appendChild(note);
  }
  sec.appendChild(eCard);

  // 2-col grid
  var g = grid2();

  // Today's Focus
  var fCard = card({padding:'20px'});
  var fh = row('space-between'); fh.style.marginBottom = '14px';
  fh.appendChild(hx('h2',{fontFamily:'Lora,Georgia,serif',fontSize:'16px'},'Today\'s Focus'));
  fh.appendChild(badge(doneN+' done','#4E8B6A','#E0F0E8'));
  fCard.appendChild(fh);
  var top3 = pending.slice(0,3);
  if (!top3.length) {
    fCard.appendChild(p({color:'#A08B76',fontSize:'14px'},'No tasks yet — add some in Tasks!'));
  } else {
    top3.forEach(function(task, i) {
      var r = d({display:'flex',alignItems:'center',gap:'10px',padding:'8px 10px',
        borderRadius:'8px',background:i===0?'#FAEADE':'#FDF8F2',
        border:'1px solid '+(i===0?'#FAEADE':'#E4D8C8'),marginBottom:'8px',
        animation:'slideIn .3s ease '+(i*.08)+'s both'});
      r.innerHTML = '<div style="width:8px;height:8px;border-radius:50%;background:'+(i===0?'#C4714A':'#E4D8C8')+';flex-shrink:0"></div>'
        + '<span style="font-size:13px;color:'+(i===0?'#9E5636':'#6B5240')+';font-weight:'+(i===0?500:400)+'">'+task.title+'</span>';
      fCard.appendChild(r);
    });
  }
  g.appendChild(fCard);

  // Streak
  var sCard = card({padding:'20px'});
  sCard.appendChild(hx('h2',{fontFamily:'Lora,Georgia,serif',fontSize:'16px',marginBottom:'14px'},'Your Streak'));
  [{label:'Tasks completed',val:doneN,color:'#4E8B6A'},{label:'Focus sessions',val:3,color:'#7065A8'},{label:'Day streak',val:5,color:'#C89030'}].forEach(function(s) {
    var r = d({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'});
    r.innerHTML = '<span style="font-size:13px;color:#6B5240">'+s.label+'</span>'
      + '<span style="font-family:Lora,Georgia,serif;font-weight:700;font-size:18px;color:'+s.color+'">'+s.val+'</span>';
    sCard.appendChild(r);
  });
  g.appendChild(sCard);
  sec.appendChild(g);

  // Quick Capture
  var cCard = card({padding:'20px'});
  var ch = row('space-between'); ch.style.marginBottom = '14px';
  var chl = d();
  chl.innerHTML = '<h2 style="font-family:Lora,Georgia,serif;font-size:16px">Quick Capture</h2><p style="font-size:12px;color:#A08B76;margin-top:2px">Dump thoughts here. Process later.</p>';
  ch.appendChild(chl);
  ch.appendChild(btn(ic('plus',13,'#fff')+' Capture','btn-primary btn-sm',function(){S.showCapture=!S.showCapture;renderView();}));
  cCard.appendChild(ch);
  if (S.showCapture) {
    var cf = d({marginBottom:'14px',animation:'fadeUp .2s ease'});
    var ct = ta('What\'s in your head right now?');
    cf.appendChild(ct);
    var cr = d({display:'flex',gap:'8px',marginTop:'8px'});
    cr.appendChild(btn('Save','btn-primary btn-sm',function(){if(ct.value.trim()){S.captures.unshift({id:Date.now(),text:ct.value.trim()});S.showCapture=false;renderView();}}));
    cr.appendChild(btn('Cancel','btn-ghost btn-sm',function(){S.showCapture=false;renderView();}));
    cf.appendChild(cr);
    cCard.appendChild(cf);
  }
  S.captures.slice(0,3).forEach(function(c) {
    var r = d({display:'flex',alignItems:'flex-start',gap:'10px',padding:'10px 12px',
      borderRadius:'8px',background:'#FDF8F2',border:'1px solid #E4D8C8',marginBottom:'6px',fontSize:'13px'});
    r.innerHTML = ic('capture',14,'#A08B76','margin-top:2px;flex-shrink:0')+'<span style="color:#6B5240;flex:1">'+c.text+'</span>';
    cCard.appendChild(r);
  });
  sec.appendChild(cCard);
  return sec;
}

// ═══════════════════════════════════════════════════════
//  VIEW: TASKS
// ═══════════════════════════════════════════════════════
function vTasks() {
  var pending = S.tasks.filter(function(t){return !t.done;});
  var done    = S.tasks.filter(function(t){return t.done;});
  var sec = section();

  // Header
  var hdr = row('space-between'); hdr.style.alignItems = 'flex-end';
  var hl = d();
  hl.innerHTML = '<h1 style="font-family:Lora,Georgia,serif;font-size:26px;font-weight:700">Tasks</h1>'
    + '<p style="color:#A08B76;font-size:14px;margin-top:4px">'+pending.length+' pending · '+done.length+' completed</p>';
  hdr.appendChild(hl);
  hdr.appendChild(btn(ic('plus',16,'#fff')+' Add Task','btn-primary',function(){
    showModal('New Task',520,function(body){
      var ti = inp('What needs doing?'), di = inp('Due date (optional)'), nt = ta('Notes (optional)');
      var br = d({display:'flex',gap:'8px',marginTop:'12px'});
      br.appendChild(btn('Save Task','btn-primary',function(){
        if(!ti.value.trim())return;
        S.tasks.push({id:Date.now(),title:ti.value.trim(),notes:nt.value,dueDate:di.value,done:false,subtasks:[]});
        closeModal(); renderView();
      }));
      br.appendChild(btn('Cancel','btn-ghost',closeModal));
      body.appendChild(ti); body.appendChild(gap(8)); body.appendChild(di); body.appendChild(gap(8)); body.appendChild(nt); body.appendChild(br);
    });
  }));
  sec.appendChild(hdr);

  // Tip pills
  var pills = d({display:'flex',gap:'8px',flexWrap:'wrap'});
  Object.keys(TIPS).forEach(function(key) {
    var b = document.createElement('button');
    b.className = 'tip-pill';
    b.innerHTML = ic('info',12,'#A08B76') + ' ' + TIPS[key].title;
    b.onclick = function() { showTip(key); };
    pills.appendChild(b);
  });
  sec.appendChild(pills);

  // Task list
  var list = d({display:'flex',flexDirection:'column',gap:'10px'});
  if (!pending.length) {
    var ec = card({padding:'20px'});
    ec.innerHTML = '<p style="color:#A08B76;text-align:center;padding:20px 0">All caught up! 🎉 Add a task above.</p>';
    list.appendChild(ec);
  }
  pending.forEach(function(task, i) {
    var prog = task.subtasks.length ? Math.round(task.subtasks.filter(function(s){return s.done;}).length / task.subtasks.length * 100) : null;
    var isExp = S.expandedTask === task.id;
    var tc = card({overflow:'hidden',animation:'fadeUp .3s ease '+(i*.06)+'s both'});

    var th = d({padding:'14px 16px'});
    var trow = d({display:'flex',alignItems:'flex-start',gap:'12px'});

    // Checkbox
    var cb = document.createElement('button');
    cb.className = 'cb';
    cb.style.cssText = 'margin-top:1px;flex-shrink:0';
    cb.onclick = function() { task.done = !task.done; renderView(); };
    trow.appendChild(cb);

    // Meta
    var meta = d({flex:'1'});
    var tr2 = d({display:'flex',alignItems:'center',gap:'8px'});
    var ts = document.createElement('span');
    ts.style.cssText = 'font-weight:500;font-size:15px;color:#2E1F0F';
    ts.textContent = task.title;
    tr2.appendChild(ts);
    if (task.dueDate) tr2.appendChild(badge(task.dueDate,'#7065A8','#ECEAF8'));
    meta.appendChild(tr2);
    if (task.notes) meta.appendChild(p({fontSize:'13px',color:'#A08B76',marginTop:'4px'},task.notes));
    if (prog !== null) {
      var pb = d({marginTop:'8px',display:'flex',alignItems:'center',gap:'8px'});
      var track = d({flex:'1',height:'4px',borderRadius:'2px',background:'#E4D8C8'});
      var fill = d({height:'100%',borderRadius:'2px',background:prog===100?'#4E8B6A':'#C4714A',width:prog+'%',transition:'width .4s ease'});
      track.appendChild(fill); pb.appendChild(track);
      pb.appendChild(hx('span',{fontSize:'11px',color:'#A08B76'},prog+'%'));
      meta.appendChild(pb);
    }
    trow.appendChild(meta);

    // Actions
    var acts = d({display:'flex',gap:'4px',flexShrink:'0'});
    var aib = document.createElement('button');
    aib.style.cssText = 'padding:4px 8px;border-radius:6px;border:1px solid #FAEADE;background:#FAEADE;color:#9E5636;font-size:11px;cursor:pointer;font-family:DM Sans,sans-serif;font-weight:600';
    aib.textContent = '🤖 AI Break';
    aib.onclick = function() { showAI(task); };
    var exb = document.createElement('button');
    exb.className = 'icon-btn';
    exb.innerHTML = ic(isExp?'chevD':'chevR',14,'#A08B76');
    exb.onclick = function() { S.expandedTask = isExp ? null : task.id; renderView(); };
    var dlb = document.createElement('button');
    dlb.className = 'icon-btn';
    dlb.innerHTML = ic('trash',13,'#A08B76');
    dlb.onclick = function() { S.tasks = S.tasks.filter(function(t){return t.id!==task.id;}); renderView(); };
    acts.appendChild(aib); acts.appendChild(exb); acts.appendChild(dlb);
    trow.appendChild(acts);
    th.appendChild(trow);
    tc.appendChild(th);

    // Subtasks panel
    if (isExp) {
      var ss = d({borderTop:'1px solid #E4D8C8',padding:'12px 16px',background:'#FDF8F2'});
      ss.appendChild(p({fontSize:'12px',color:'#A08B76',fontWeight:'600',letterSpacing:'.05em',textTransform:'uppercase',marginBottom:'10px'},'Subtasks'));
      task.subtasks.forEach(function(sub) {
        var si = d({display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px',padding:'8px 10px',
          borderRadius:'8px',background:sub.done?'#E0F0E8':'#fff',border:'1px solid '+(sub.done?'#E0F0E8':'#E4D8C8')});
        var scb = document.createElement('button');
        scb.className = 'cb cb-sm' + (sub.done?' on':'');
        scb.onclick = function() { sub.done = !sub.done; renderView(); };
        if (sub.done) scb.innerHTML = ic('check',10,'#fff');
        var st = document.createElement('span');
        st.style.cssText = 'font-size:13px;color:'+(sub.done?'#A08B76':'#2E1F0F')+';text-decoration:'+(sub.done?'line-through':'none')+';flex:1';
        st.textContent = sub.title;
        si.appendChild(scb); si.appendChild(st);
        ss.appendChild(si);
      });
      var ar = d({display:'flex',gap:'8px',marginTop:'10px'});
      var si2 = inp('Add a subtask...'); si2.style.fontSize = '13px';
      ar.appendChild(si2);
      ar.appendChild(btn('Add','btn-primary btn-sm',function(){
        if(si2.value.trim()){task.subtasks.push({id:Date.now(),title:si2.value.trim(),done:false});renderView();}
      }));
      ss.appendChild(ar);
      tc.appendChild(ss);
    }
    list.appendChild(tc);
  });
  sec.appendChild(list);

  if (done.length) {
    sec.appendChild(p({fontSize:'12px',color:'#A08B76',fontWeight:'600',letterSpacing:'.05em',textTransform:'uppercase',marginBottom:'10px',marginTop:'8px'},'Completed'));
    done.forEach(function(task) {
      var dr = d({display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',marginBottom:'6px',borderRadius:'10px',background:'#E0F0E8',opacity:'.7'});
      dr.innerHTML = ic('check',14,'#4E8B6A')+'<span style="font-size:14px;color:#6B5240;text-decoration:line-through">'+task.title+'</span>';
      sec.appendChild(dr);
    });
  }
  return sec;
}

// ═══════════════════════════════════════════════════════
//  VIEW: PROJECTS
// ═══════════════════════════════════════════════════════
function vProjects() {
  var sec = section();

function startFocus() {
  var f = S.focus; f.mode = 'running';
  if (S.timerIv) clearInterval(S.timerIv);
  S.timerIv = setInterval(function() {
    f.secs--;
    if (f.secs <= 0) {
      clearInterval(S.timerIv);
      if (f.mode === 'running') { f.cycle++; f.mode='break'; f.secs=f.brk*60; }
      else { f.mode='idle'; f.secs=f.dur*60; }
      renderView(); return;
    }
    var ft = document.getElementById('ftime');
    if (ft) ft.textContent = Math.floor(f.secs/60).toString().padStart(2,'0')+':'+(f.secs%60).toString().padStart(2,'0');
    var arc = document.getElementById('farc');
    if (arc) { var T=(f.mode==='break'?f.brk:f.dur)*60,R=80,ci=2*Math.PI*R; arc.setAttribute('stroke-dashoffset', String(ci-((T-f.secs)/T)*ci)); }
  }, 1000);
  renderView();
}
function pauseFocus() { S.focus.mode='paused'; clearInterval(S.timerIv); renderView(); }
function resetFocus() { S.focus.mode='idle'; clearInterval(S.timerIv); S.focus.secs=S.focus.dur*60; renderView(); }

function sleepDur(bed, wake) {
  var bH=+bed.split(':')[0], bM=+bed.split(':')[1];
  var wH=+wake.split(':')[0], wM=+wake.split(':')[1];
  var m = (wH*60+wM)-(bH*60+bM);
  if (m<0) m+=1440;
  return Math.floor(m/60)+'h '+(m%60)+'m';
}

    {id:'cold', emoji:'🚿',title:'Cold Splash',          desc:'Splash cold water on your face — activates the dive reflex, calms the system.', color:'#4AA8C4',bg:'#E4F4FA'},
  ];

  var grid = d({display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:'14px'});
  tools.forEach(function(tool, i) {
    var c = card({padding:'20px',cursor:'pointer',animation:'fadeUp .3s ease '+(i*.07)+'s both',transition:'transform .15s'});
    c.onmouseenter = function(){c.style.transform='translateY(-2px)';};
    c.onmouseleave = function(){c.style.transform='';};
    c.innerHTML = '<div style="font-size:28px;margin-bottom:10px">'+tool.emoji+'</div>'
      + '<h3 style="font-family:Lora,Georgia,serif;font-size:15px;font-weight:600;margin-bottom:6px">'+tool.title+'</h3>'
      + '<p style="font-size:13px;color:#A08B76;line-height:1.5">'+tool.desc+'</p>';
    if (tool.id==='box') {
      var sb = btn('Start Breathing','btn-primary btn-sm',function(e){e.stopPropagation();doBreathing(c,sb);});
      sb.style.marginTop = '12px';
      c.appendChild(sb);
    }
    grid.appendChild(c);
  });
  sec.appendChild(grid);

  // Progress chart
  var cc = card({padding:'20px'});
  cc.appendChild(hx('h3',{fontFamily:'Lora,Georgia,serif',fontSize:'16px',marginBottom:'16px'},'📊 This Week\'s Progress'));
  var chart = d({display:'flex',gap:'8px',alignItems:'flex-end',height:'80px'});
  [60,80,45,90,70,30,55].forEach(function(v,i){
    var w = d({flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'});
    var bar = d({width:'100%',height:v*.7+'%',borderRadius:'4px 4px 0 0',
      background:i===3?'#4E8B6A':i<5?'#C4714A':'#E4D8C8',
      animation:'fadeUp .4s ease '+(i*.08)+'s both'});
    var lbl2 = document.createElement('span');
    lbl2.style.cssText='font-size:11px;color:#A08B76';
    lbl2.textContent='MTWTFSS'[i];
    w.appendChild(bar); w.appendChild(lbl2); chart.appendChild(w);
  });
  cc.appendChild(chart);
  cc.appendChild(p({fontSize:'12px',color:'#A08B76',marginTop:'10px'},'Tasks completed · Best day: Thursday'));
  sec.appendChild(cc);
  return sec;
}

function doBreathing(card2, startBtn) {
  if (S.breathIv) clearInterval(S.breathIv);
  startBtn.remove();
  var phases = ['Breathe In','Hold','Breathe Out','Hold']; var idx=0;
  var circle = d({width:'80px',height:'80px',borderRadius:'50%',background:'#ECEAF8',
    border:'3px solid #7065A8',display:'flex',alignItems:'center',justifyContent:'center',
    margin:'12px auto 8px',fontSize:'11px',fontWeight:'700',color:'#7065A8',
    textTransform:'uppercase',transition:'transform 4s ease'});
  circle.textContent = phases[0];
  var stopBtn = btn('Stop','btn-secondary btn-sm',function(){
    clearInterval(S.breathIv); S.breathIv=null;
    circle.remove(); stopBtn.remove();
    var nb=btn('Start Breathing','btn-primary btn-sm',function(e){e.stopPropagation();doBreathing(card2,nb);});
    nb.style.marginTop='12px'; card2.appendChild(nb);
  });
  stopBtn.style.cssText='display:block;margin:4px auto 0';
  card2.appendChild(circle); card2.appendChild(stopBtn);
  S.breathIv = setInterval(function(){
    idx=(idx+1)%4; circle.textContent=phases[idx];
    circle.style.transform=(idx===0||idx===2)?'scale(1.25)':'scale(1)';
  },4000);
}
